<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تكاليف سوفت - النسيج</title>
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.14.0/dist/sql-wasm.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .teal { background-color: #0f766e; }
    .screen { display: none; }
    .active { display: block; }
  </style>
</head>
<body class="bg-gray-100 rtl">

  <!-- Top Bar -->
  <div class="teal text-white p-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <i onclick="showScreen('dashboard')" class="fas fa-bars text-3xl cursor-pointer"></i>
      <h1 class="text-2xl font-bold">تكاليف سوفت</h1>
    </div>
    <div class="flex gap-4">
      <i class="fas fa-bell text-2xl"></i>
      <i class="fas fa-share-alt text-2xl"></i>
    </div>
  </div>

  <!-- Quick Buttons -->
  <div class="p-4 grid grid-cols-2 gap-3">
    <button onclick="showScreen('cash')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3 hover:bg-teal-50">
      <div class="text-4xl">📄</div><div><p class="font-bold">قبض/صرف</p></div>
    </button>
    <button onclick="showScreen('salesList')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3 hover:bg-teal-50">
      <div class="text-4xl">🛒</div><div><p class="font-bold">المبيعات</p></div>
    </button>
    <button onclick="showScreen('products')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3 hover:bg-teal-50">
      <div class="text-4xl">📋</div><div><p class="font-bold">الأصناف</p></div>
    </button>
    <button onclick="alert('أمر إنتاج - سيتم تطويره في الخطوة القادمة')" class="bg-white rounded-2xl shadow p-4 flex items-center gap-3 hover:bg-teal-50">
      <div class="text-4xl">⚙️</div><div><p class="font-bold">أمر إنتاج</p></div>
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="screen active p-4 text-center">
    <p class="text-3xl font-bold text-teal-700 mt-10">مرحباً بك في تكاليف سوفت - النسيج</p>
  </div>

  <!-- CASH SCREEN -->
  <div id="cash" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">قبض/صرف</h2>
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <table class="w-full"><thead class="bg-teal-700 text-white"><tr><th class="p-3">نوع</th><th class="p-3">البيان</th><th class="p-3">المبلغ</th><th class="p-3">التاريخ</th><th class="p-3">رقم</th></tr></thead><tbody id="cash-table" class="divide-y"></tbody></table>
    </div>
    <button onclick="addCashTransaction()" class="fixed bottom-8 right-8 bg-teal-600 text-white w-16 h-16 rounded-full text-5xl shadow-2xl flex items-center justify-center z-50">+</button>
  </div>

  <!-- SALES LIST -->
  <div id="salesList" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">قائمة المبيعات</h2>
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <table class="w-full"><thead class="bg-teal-700 text-white"><tr><th class="p-3">المبلغ</th><th class="p-3">العميل</th><th class="p-3">التاريخ</th><th class="p-3">رقم</th></tr></thead><tbody id="sales-table" class="divide-y"></tbody></table>
    </div>
    <button onclick="createNewInvoice()" class="fixed bottom-8 right-8 bg-teal-600 text-white w-16 h-16 rounded-full text-5xl shadow-2xl flex items-center justify-center z-50">+</button>
  </div>

  <!-- NEW INVOICE -->
  <div id="newInvoice" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">بيع آجل</h2>
    <div class="bg-white rounded-3xl shadow p-6">
      <input id="invoice-customer" type="text" placeholder="اسم العميل" class="w-full p-4 border rounded-2xl mb-4">
      <input id="invoice-date" type="date" class="w-full p-4 border rounded-2xl mb-4">
      <button onclick="addItemToInvoice()" class="w-full bg-teal-600 text-white py-4 rounded-2xl mb-6">+ إضافة صنف</button>
      <div id="invoice-items-list" class="space-y-3 mb-6"></div>
      <div class="flex justify-between text-xl font-bold border-t pt-4"><span>الإجمالي</span><span id="invoice-total" class="text-teal-600">0 ريال</span></div>
      <div class="grid grid-cols-2 gap-4 mt-8">
        <button onclick="saveInvoice()" class="bg-green-600 text-white py-6 rounded-3xl text-xl font-bold">💾 حفظ الفاتورة</button>
        <button onclick="printInvoice()" class="bg-blue-600 text-white py-6 rounded-3xl text-xl font-bold">🖨️ طباعة</button>
      </div>
    </div>
  </div>

  <!-- FULL PRODUCTS SCREEN (الأصناف) -->
  <div id="products" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">الأصناف والمخزون</h2>
    <button onclick="addNewProduct()" class="w-full bg-teal-600 text-white py-4 rounded-3xl mb-6">+ إضافة صنف جديد (متر/كجم)</button>
    <div id="products-list" class="space-y-4"></div>
  </div>

  <script>
    let db;
    let currentInvoiceItems = [];

    async function initSQLite() {
      const SQL = await initSqlJs({ locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1.14.0/dist/${f}` });
      db = new SQL.Database();

      db.run(`CREATE TABLE IF NOT EXISTS cash (id INTEGER PRIMARY KEY, type TEXT, description TEXT, amount REAL, date TEXT, voucher INTEGER);
              CREATE TABLE IF NOT EXISTS invoices (id INTEGER PRIMARY KEY, date TEXT, customer TEXT, total REAL);
              CREATE TABLE IF NOT EXISTS products (id INTEGER PRIMARY KEY, name TEXT, price REAL, stock REAL, unit TEXT DEFAULT 'متر', conversion REAL DEFAULT 1);`);

      refreshAll();
      console.log('%c✅ Full Project Updated - الأصناف مكتملة الآن', 'color:#0f766e; font-size:18px; font-weight:bold');
    }

    function refreshAll() {
      refreshCashList();
      refreshSalesList();
      renderProducts();
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if (id === 'cash') refreshCashList();
      if (id === 'salesList') refreshSalesList();
      if (id === 'products') renderProducts();
    }

    // Cash, Sales, Invoice functions (same as previous stable version)
    function refreshCashList() { /* ... same as before ... */ }
    function addCashTransaction() { /* ... same as before ... */ }
    function refreshSalesList() { /* ... same as before ... */ }
    function createNewInvoice() { /* ... same as before ... */ }
    function addItemToInvoice() { /* ... same as before ... */ }
    function renderInvoiceItems() { /* ... same as before ... */ }
    function saveInvoice() { /* ... same as before ... */ }
    function printInvoice() { alert("🖨️ الطباعة جاهزة"); }

    // FULL PRODUCTS MODULE
    function renderProducts() {
      const container = document.getElementById('products-list');
      container.innerHTML = '';
      const stmt = db.prepare("SELECT * FROM products ORDER BY name");
      while (stmt.step()) {
        const p = stmt.getAsObject();
        const div = document.createElement('div');
        div.className = "bg-white p-5 rounded-3xl shadow flex justify-between items-center";
        div.innerHTML = `
          <div>
            <div class="font-bold">${p.name}</div>
            <div class="text-sm text-gray-500">${p.unit} • ${p.stock} ${p.unit}</div>
          </div>
          <div class="text-right">
            <div class="font-bold">\( {p.price} ريال/ \){p.unit}</div>
            <button onclick="editProduct(${p.id})" class="text-teal-600 text-sm mt-2">تعديل المخزون</button>
          </div>
        `;
        container.appendChild(div);
      }
      stmt.free();
    }

    function addNewProduct() {
      const name = prompt("اسم الصنف (مثال: قماش قطني):");
      if (!name) return;
      const price = parseFloat(prompt("السعر للوحدة:", "120"));
      const stock = parseFloat(prompt("المخزون الحالي:", "100"));
      const unit = prompt("الوحدة (متر أو كجم):", "متر");
      const conversion = parseFloat(prompt("عامل التحويل (مثال: 0.25 كجم = 1 متر):", "1"));
      db.run("INSERT INTO products (name, price, stock, unit, conversion) VALUES (?, ?, ?, ?, ?)", [name, price, stock, unit, conversion]);
      renderProducts();
    }

    function editProduct(id) {
      const newStock = prompt("المخزون الجديد:", "100");
      if (newStock !== null) {
        db.run("UPDATE products SET stock = ? WHERE id = ?", [parseFloat(newStock), id]);
        renderProducts();
      }
    }

    window.onload = initSQLite;
  </script>
</body>
</html>
