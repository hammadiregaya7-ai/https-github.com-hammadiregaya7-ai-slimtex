<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تكاليف سوفت - النسيج Pro v2</title>

  <!-- External Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.14.0/dist/sql-wasm.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 rtl">

  <!-- Top Bar -->
  <div class="teal text-white p-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <i onclick="showScreen('dashboard')" class="fas fa-bars text-3xl cursor-pointer"></i>
      <h1 class="text-2xl font-bold">تكاليف سوفت - النسيج Pro v2</h1>
    </div>
  </div>

  <!-- Quick Buttons -->
  <div class="p-4 grid grid-cols-3 gap-3">
    <button onclick="showScreen('dashboard')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📊</div><p class="font-bold text-sm">الرئيسية</p>
    </button>
    <button onclick="showScreen('pos')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">🛒</div><p class="font-bold text-sm">نقاط البيع</p>
    </button>
    <button onclick="showScreen('salesList')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📋</div><p class="font-bold text-sm">الفواتير</p>
    </button>
    <button onclick="showScreen('products')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📦</div><p class="font-bold text-sm">الأصناف</p>
    </button>
    <button onclick="showScreen('customers')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">👥</div><p class="font-bold text-sm">العملاء</p>
    </button>
    <button onclick="showScreen('suppliers')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">🏪</div><p class="font-bold text-sm">الموردين</p>
    </button>
    <button onclick="showScreen('cash')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📄</div><p class="font-bold text-sm">قبض/صرف</p>
    </button>
    <button onclick="showScreen('reports')" class="bg-white rounded-3xl shadow p-4 flex flex-col items-center hover:bg-teal-50">
      <div class="text-4xl mb-1">📈</div><p class="font-bold text-sm">التقارير</p>
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="screen active p-4">
    <h2 class="text-2xl font-bold mb-4">الرئيسية</h2>
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white p-6 rounded-3xl shadow text-center">
        <p class="text-sm text-gray-500">مبيعات اليوم</p>
        <p id="today-sales" class="text-4xl font-bold text-teal-600">0 ريال</p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow text-center">
        <p class="text-sm text-gray-500">الربح اليوم</p>
        <p id="today-profit" class="text-4xl font-bold text-emerald-600">0 ريال</p>
      </div>
    </div>
    <div class="mt-6 bg-white p-6 rounded-3xl shadow">
      <h3 class="font-bold mb-3">أصناف قريبة من النفاد</h3>
      <div id="low-stock-list" class="space-y-3"></div>
    </div>
  </div>

  <!-- POS -->
  <div id="pos" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">نقاط البيع</h2>
    <div class="bg-white rounded-3xl shadow p-6">
      <select id="pos-customer" class="w-full p-4 border rounded-2xl mb-4"></select>
      <input id="pos-date" type="date" class="w-full p-4 border rounded-2xl mb-4">
      <input id="product-search-input" type="text" placeholder="ابحث عن صنف..." class="w-full p-4 border rounded-2xl mb-4" onkeyup="if(event.key==='Enter') searchAndAddToCart()">
      <div id="cart-items" class="space-y-3 mb-6 min-h-[200px]"></div>
      <div class="flex justify-between text-2xl font-bold border-t pt-4">
        <span>الإجمالي</span>
        <span id="cart-total" class="text-teal-600">0 ريال</span>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-8">
        <button onclick="saveSale()" class="bg-green-600 text-white py-6 rounded-3xl text-xl font-bold">💾 حفظ الفاتورة</button>
        <button onclick="printCurrentSale()" class="bg-blue-600 text-white py-6 rounded-3xl text-xl font-bold">🖨️ طباعة A4</button>
      </div>
    </div>
  </div>

  <!-- SALES LIST -->
  <div id="salesList" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">الفواتير السابقة</h2>
    <div id="sales-list-container" class="space-y-4"></div>
  </div>

  <!-- PRODUCTS -->
  <div id="products" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">إدارة الأصناف</h2>
    <button onclick="addNewProduct()" class="w-full bg-teal-600 text-white py-4 rounded-3xl mb-6">+ إضافة صنف جديد</button>
    <div id="products-list" class="space-y-4"></div>
  </div>

  <!-- CUSTOMERS -->
  <div id="customers" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">إدارة العملاء</h2>
    <button onclick="addCustomer()" class="w-full bg-teal-600 text-white py-4 rounded-3xl mb-6">+ إضافة عميل جديد</button>
    <div id="customers-list" class="space-y-4"></div>
  </div>

  <!-- SUPPLIERS -->
  <div id="suppliers" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">إدارة الموردين</h2>
    <button onclick="addSupplier()" class="w-full bg-teal-600 text-white py-4 rounded-3xl mb-6">+ إضافة مورد جديد</button>
    <div id="suppliers-list" class="space-y-4"></div>
  </div>

  <!-- CASH -->
  <div id="cash" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">قبض / صرف</h2>
    <div class="bg-white rounded-3xl shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-teal-700 text-white"><tr><th class="p-3">النوع</th><th class="p-3">البيان</th><th class="p-3">المبلغ</th><th class="p-3">التاريخ</th><th class="p-3">رقم</th></tr></thead>
        <tbody id="cash-table" class="divide-y"></tbody>
      </table>
    </div>
    <button onclick="addCashTransaction()" class="fixed bottom-8 right-8 bg-teal-600 text-white w-16 h-16 rounded-full text-5xl shadow-2xl flex items-center justify-center z-50">+</button>
  </div>

  <!-- REPORTS -->
  <div id="reports" class="screen p-4">
    <h2 class="text-2xl font-bold mb-4">التقارير المتقدمة</h2>
    <div id="reports-content" class="bg-white rounded-3xl shadow p-6"></div>
  </div>

  <!-- Hidden Print Area -->
  <div id="print-area" class="hidden"></div>

  <!-- JavaScript Files (Modular Structure) -->
  <script src="js/database.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pos.js"></script>
  <script src="js/sales.js"></script>
  <script src="js/reports.js"></script>

  <script>
    // تهيئة التطبيق
    window.onload = initSQLite;
  </script>
</body>
</html>
